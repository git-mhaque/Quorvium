name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      product_version: ${{ steps.version.outputs.product_version }}
      client_release_artifact_name: ${{ steps.package_client.outputs.artifact_name }}
      client_release_bundle_sha256: ${{ steps.package_client.outputs.artifact_sha256 }}
      client_release_manifest_sha256: ${{ steps.package_client.outputs.manifest_sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute product version
        id: version
        env:
          BUILD_SHA: ${{ github.sha }}
          BUILD_RUN_NUMBER: ${{ github.run_number }}
        run: |
          SHORT_SHA="$(printf '%s' "${BUILD_SHA}" | cut -c1-7)"
          DATE_UTC="$(date -u '+%Y.%m.%d')"
          PRODUCT_VERSION="${DATE_UTC}.${BUILD_RUN_NUMBER}.${SHORT_SHA}"
          echo "product_version=${PRODUCT_VERSION}" >> "$GITHUB_OUTPUT"
          printf 'Computed product version: %s\n' "${PRODUCT_VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build project
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.product_version }}
        run: npm run build

      - name: Package client release artifact
        id: package_client
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PRODUCT_VERSION: ${{ steps.version.outputs.product_version }}
          BUILD_SHA: ${{ github.sha }}
        run: |
          mkdir -p release-artifacts

          ARTIFACT_NAME="client-${PRODUCT_VERSION}.tar.gz"
          ARTIFACT_PATH="release-artifacts/${ARTIFACT_NAME}"
          tar -C client/dist -czf "${ARTIFACT_PATH}" .

          ARTIFACT_SHA256="$(shasum -a 256 "${ARTIFACT_PATH}" | awk '{print $1}')"
          CREATED_AT_UTC="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          cat > release-artifacts/release-manifest.json <<MANIFEST
          {
            "productVersion": "${PRODUCT_VERSION}",
            "artifactName": "${ARTIFACT_NAME}",
            "artifactSha256": "${ARTIFACT_SHA256}",
            "gitSha": "${BUILD_SHA}",
            "createdAtUtc": "${CREATED_AT_UTC}"
          }
          MANIFEST

          MANIFEST_SHA256="$(shasum -a 256 release-artifacts/release-manifest.json | awk '{print $1}')"

          printf '%s  %s\n' "${ARTIFACT_SHA256}" "${ARTIFACT_NAME}" > release-artifacts/client-artifact.sha256
          printf '%s  %s\n' "${MANIFEST_SHA256}" "release-manifest.json" > release-artifacts/release-manifest.sha256

          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_sha256=${ARTIFACT_SHA256}" >> "$GITHUB_OUTPUT"
          echo "manifest_sha256=${MANIFEST_SHA256}" >> "$GITHUB_OUTPUT"

          printf 'Client release artifact: %s\nArtifact SHA256: %s\nManifest SHA256: %s\n' "${ARTIFACT_NAME}" "${ARTIFACT_SHA256}" "${MANIFEST_SHA256}"

      - name: Upload client release artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: client-release-${{ steps.version.outputs.product_version }}
          path: release-artifacts/
          if-no-files-found: error

  docker-publish:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
      image_digest: ${{ steps.push.outputs.image_digest }}
      image_uri_version: ${{ steps.push.outputs.image_uri_version }}
      product_version: ${{ needs.build.outputs.product_version }}
    permissions:
      contents: read
    env:
      IMAGE_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
      IMAGE_TAG: ${{ github.sha }}
      PRODUCT_VERSION: ${{ needs.build.outputs.product_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: |
          HOST="$(echo "${IMAGE_REPO}" | cut -d'/' -f1)"
          gcloud auth configure-docker "${HOST}" --quiet

      - name: Build container image
        env:
          IMAGE_URI: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          IMAGE_URI_VERSION: ${{ env.IMAGE_REPO }}:${{ env.PRODUCT_VERSION }}
        run: |
          docker build \
            --file Dockerfile \
            --tag "${IMAGE_URI}" \
            --tag "${IMAGE_URI_VERSION}" \
            --label "org.opencontainers.image.version=${PRODUCT_VERSION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            .

      - name: Push container image
        id: push
        env:
          IMAGE_URI: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          IMAGE_URI_VERSION: ${{ env.IMAGE_REPO }}:${{ env.PRODUCT_VERSION }}
        run: |
          docker push "${IMAGE_URI}"
          docker push "${IMAGE_URI_VERSION}"
          DIGEST="$(docker image inspect "${IMAGE_URI}" --format '{{index .RepoDigests 0}}')"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "image_uri_version=${IMAGE_URI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Emit image details
        env:
          IMAGE_URI: ${{ steps.push.outputs.image_uri }}
          IMAGE_URI_VERSION: ${{ steps.push.outputs.image_uri_version }}
          IMAGE_DIGEST: ${{ steps.push.outputs.image_digest }}
          PRODUCT_VERSION: ${{ env.PRODUCT_VERSION }}
        run: |
          printf 'Image pushed (SHA): %s\nImage pushed (version): %s\nProduct version: %s\nDigest: %s\n' "${IMAGE_URI}" "${IMAGE_URI_VERSION}" "${PRODUCT_VERSION}" "${IMAGE_DIGEST}"

  deploy-api-staging:
    name: Deploy API (staging)
    runs-on: ubuntu-latest
    needs:
      - build
      - docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
      CLIENT_ORIGIN: ${{ secrets.CLIENT_ORIGIN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      GOOGLE_CLIENT_SECRET_SECRET_ID: ${{ secrets.GOOGLE_CLIENT_SECRET_SECRET_ID }}
      PRODUCT_VERSION: ${{ needs.build.outputs.product_version }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate deploy inputs
        run: |
          for key in GCP_PROJECT_ID GCP_REGION CLOUD_RUN_SERVICE ARTIFACT_REGISTRY_REPO CLIENT_ORIGIN GOOGLE_CLIENT_ID GOOGLE_REDIRECT_URI GOOGLE_CLIENT_SECRET_SECRET_ID PRODUCT_VERSION; do
            if [ -z "${!key}" ]; then
              echo "${key} secret/output is required" >&2
              exit 1
            fi
          done

      - name: Deploy API revision to Cloud Run
        run: |
          IMAGE_URI="${ARTIFACT_REGISTRY_REPO}:${GITHUB_SHA}"
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --image="${IMAGE_URI}" \
            --set-env-vars="NODE_ENV=production,DATA_DIR=/tmp/quorvium-data,CLIENT_ORIGIN=${CLIENT_ORIGIN},GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID},GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI},PRODUCT_VERSION=${PRODUCT_VERSION}" \
            --set-secrets="GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET_SECRET_ID}:latest" \
            --quiet

  deploy-client-staging:
    name: Deploy Client (staging)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment: staging
    env:
      PRODUCT_VERSION: ${{ needs.build.outputs.product_version }}
      ARTIFACT_NAME: ${{ needs.build.outputs.client_release_artifact_name }}
      EXPECTED_ARTIFACT_SHA256: ${{ needs.build.outputs.client_release_bundle_sha256 }}
      STAGING_BUCKET: ${{ secrets.STAGING_BUCKET }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
      VITE_ROUTER_MODE: ${{ secrets.VITE_ROUTER_MODE }}
    steps:
      - name: Download client release artifact
        uses: actions/download-artifact@v4
        with:
          name: client-release-${{ needs.build.outputs.product_version }}
          path: release-artifacts

      - name: Validate and extract client release artifact
        run: |
          for key in PRODUCT_VERSION ARTIFACT_NAME EXPECTED_ARTIFACT_SHA256 STAGING_BUCKET VITE_API_BASE_URL VITE_GOOGLE_REDIRECT_URI VITE_ROUTER_MODE; do
            if [ -z "${!key}" ]; then
              echo "${key} secret/output is required" >&2
              exit 1
            fi
          done

          if ! printf '%s' "${STAGING_BUCKET}" | grep -q '^gs://'; then
            echo "STAGING_BUCKET must start with gs:// (received: ${STAGING_BUCKET})" >&2
            exit 1
          fi

          ACTUAL_ARTIFACT_SHA256="$(shasum -a 256 "release-artifacts/${ARTIFACT_NAME}" | awk '{print $1}')"
          if [ "${ACTUAL_ARTIFACT_SHA256}" != "${EXPECTED_ARTIFACT_SHA256}" ]; then
            echo "Artifact checksum mismatch. Expected ${EXPECTED_ARTIFACT_SHA256}, got ${ACTUAL_ARTIFACT_SHA256}" >&2
            exit 1
          fi

          mkdir -p client-dist
          tar -xzf "release-artifacts/${ARTIFACT_NAME}" -C client-dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gsutil
        run: gcloud components install gsutil --quiet

      - name: Deploy immutable client artifact to staging bucket
        run: |
          DIST_DIR="client-dist"
          TARGET="${STAGING_BUCKET%/}"

          if [ ! -d "${DIST_DIR}" ]; then
            echo "Build output directory not found: ${DIST_DIR}" >&2
            exit 1
          fi
          if [ ! -f "${DIST_DIR}/index.html" ]; then
            echo "Build output missing index.html" >&2
            exit 1
          fi

          echo "Deploying release ${PRODUCT_VERSION} to ${TARGET}"

          if [ -d "${DIST_DIR}/assets" ]; then
            echo "Uploading hashed /assets with immutable caching"
            gsutil -m -h "Cache-Control:public,max-age=31536000,immutable" \
              rsync -r "${DIST_DIR}/assets" "${TARGET}/assets"
          fi

          echo "Uploading non-HTML static files (excluding /assets and runtime-config.js) with short cache"
          gsutil -m -h "Cache-Control:public,max-age=300" \
            rsync -r -x '(^|/)assets/|\.html$|runtime-config\.js$' "${DIST_DIR}" "${TARGET}"

          cat > runtime-config.js <<CONFIG
          window.__QUORVIUM_RUNTIME_CONFIG__ = {
            apiBaseUrl: "${VITE_API_BASE_URL}",
            googleClientId: "${VITE_GOOGLE_CLIENT_ID}",
            googleRedirectUri: "${VITE_GOOGLE_REDIRECT_URI}",
            routerMode: "${VITE_ROUTER_MODE}",
            appVersion: "${PRODUCT_VERSION}"
          };
          CONFIG

          echo "Uploading runtime-config.js and HTML entrypoints with no-store"
          gsutil -h "Cache-Control:no-store,max-age=0" cp runtime-config.js "${TARGET}/runtime-config.js"
          for file in index.html 404.html; do
            if [ -f "${DIST_DIR}/${file}" ]; then
              gsutil -h "Cache-Control:no-store,max-age=0" cp "${DIST_DIR}/${file}" "${TARGET}/${file}"
            fi
          done

      - name: Publish release bundle + manifest to staging release catalog
        run: |
          TARGET="${STAGING_BUCKET%/}"
          RELEASE_PREFIX="${TARGET}/_releases/${PRODUCT_VERSION}"

          gsutil -h "Cache-Control:public,max-age=31536000,immutable" \
            cp "release-artifacts/${ARTIFACT_NAME}" "${RELEASE_PREFIX}/${ARTIFACT_NAME}"
          gsutil -h "Cache-Control:no-store,max-age=0" \
            cp "release-artifacts/release-manifest.json" "${RELEASE_PREFIX}/release-manifest.json"
          gsutil -h "Cache-Control:no-store,max-age=0" \
            cp "release-artifacts/client-artifact.sha256" "${RELEASE_PREFIX}/client-artifact.sha256"
          gsutil -h "Cache-Control:no-store,max-age=0" \
            cp "release-artifacts/release-manifest.sha256" "${RELEASE_PREFIX}/release-manifest.sha256"

      - name: Verify staged release checksum
        run: |
          TARGET="${STAGING_BUCKET%/}"
          RELEASE_PREFIX="${TARGET}/_releases/${PRODUCT_VERSION}"

          gsutil cp "${RELEASE_PREFIX}/${ARTIFACT_NAME}" ./staging-release.tar.gz
          STAGING_SHA256="$(shasum -a 256 ./staging-release.tar.gz | awk '{print $1}')"

          if [ "${STAGING_SHA256}" != "${EXPECTED_ARTIFACT_SHA256}" ]; then
            echo "Staging release checksum mismatch. Expected ${EXPECTED_ARTIFACT_SHA256}, got ${STAGING_SHA256}" >&2
            exit 1
          fi

          printf 'Staging release verified: %s (%s)\n' "${PRODUCT_VERSION}" "${STAGING_SHA256}"
